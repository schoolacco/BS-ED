<body style="background-color: #000000;">
<style>
@keyframes kyberTessellate {
  0%, 70%, 100% {
    background-size:
      100% 100%,   /* kyber gradient */
      0% 0%;       /* tessellation hidden */
    background-position: center;
  }

  80% {
    background-size:
      100% 100%,
      120% 120%;
  }

  90% {
    background-size:
      100% 100%,
      160% 160%;
  }
}

.kyber-crystal {
  background:
    /* Base kyber gradient */
    linear-gradient(
      180deg,
      #7aa6ff,
      #608ff0,
      #534eda,
      #3b2f8f
    ),

    /* Tessellating diamond grid */
    repeating-linear-gradient(
      180deg,
      #7aa6ff,
      #608ff0,
      #534eda,
      #3b2f8f
    );

  background-repeat: no-repeat;
  background-position: center;
  background-size: 100% 100%, 0% 0%;

  animation: kyberTessellate 5s ease-in-out infinite;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke: 1px #2b2a66;
}

</style>

<b><big><big><span class="kyber-crystal", style="font-size: 80px">Wizard10989</span></big></big></b>
</body>
